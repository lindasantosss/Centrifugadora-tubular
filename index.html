<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Simulador AR — Centrífuga Tubular · Sílice en Agua</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
  :root{
    --steel-dark:#1c1e21;
    --steel-mid:#33363b;
    --steel-light:#9aa0a6;
    --hazard-yellow:#f2c14e;
    --hazard-red:#e4572e;
    --readout-teal:#5ec8c2;
    --heavy-green:#2f7d5c;
    --panel-bg: rgba(24,26,29,0.95);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;font-family:'IBM Plex Mono',monospace;background:#000;}
  a-scene{width:100%;height:100%;}
  #hud{ position:fixed; inset:0; pointer-events:none; z-index:20; }

  #top-bar{ position:absolute; top:0; left:0; right:0; padding:6px 8px; pointer-events:none;
    display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
  #top-bar .brand{ font-family:'Oswald',sans-serif; font-weight:700; font-size:9.5px; letter-spacing:0.8px;
    color:var(--hazard-yellow); background:rgba(24,26,29,0.85); padding:3px 7px; border-radius:3px;
    border-left:3px solid var(--hazard-yellow); pointer-events:auto; }
  #mini-readout{ font-size:9.5px; color:var(--readout-teal); background:rgba(24,26,29,0.85);
    padding:3px 7px; border-radius:3px; pointer-events:auto; text-align:right; }

  /* -------- panel: tarjeta COMPACTA y CENTRADA, no una barra de ancho completo -------- */
  #panel-toggle{ position:absolute; bottom:10px; left:50%; transform:translateX(-50%); pointer-events:auto; cursor:pointer;
    background:var(--hazard-yellow); color:var(--steel-dark); font-family:'Oswald',sans-serif; font-weight:700;
    font-size:10px; letter-spacing:1px; text-transform:uppercase; padding:6px 14px; border-radius:16px; border:none;
    box-shadow:0 3px 8px rgba(0,0,0,0.5); z-index:25; }
  #panel{
    position:absolute; left:50%; bottom:0; transform:translate(-50%, 100%);
    width:min(88vw, 300px);
    background:var(--panel-bg); border:1px solid var(--steel-mid); border-bottom:none;
    border-radius:10px 10px 0 0;
    padding:8px 10px 10px; pointer-events:auto; color:#e9e9e9;
    max-height:44vh; overflow-y:auto;
    transition:transform 0.22s ease;
    box-shadow:0 -4px 16px rgba(0,0,0,0.5);
  }
  #panel.open{ transform:translate(-50%, 0); }
  #panel h1{ font-family:'Oswald',sans-serif; font-weight:700; font-size:10.5px; letter-spacing:1px; text-transform:uppercase;
    margin:0 0 6px; color:var(--hazard-yellow); display:flex; align-items:center; gap:6px; }
  #panel h1::before{ content:""; width:6px;height:6px;border-radius:50%; background:var(--readout-teal); box-shadow:0 0 5px var(--readout-teal); }

  .row{display:flex; align-items:center; gap:6px; margin-bottom:5px;}
  .row label{ font-size:8.5px; width:78px; flex-shrink:0; text-transform:uppercase; letter-spacing:0.3px; color:var(--steel-light); line-height:1.15; }
  .row input[type=range]{ flex:1; accent-color: var(--readout-teal); height:3px; }
  .row .val{ width:58px; text-align:right; font-size:9px; color:var(--readout-teal); font-weight:600; flex-shrink:0; }

  #readouts{ display:grid; grid-template-columns:1fr 1fr; gap:3px 8px; margin:6px 0; padding:5px 7px;
    background:var(--steel-dark); border:1px solid var(--steel-mid); border-radius:4px; }
  #readouts div{font-size:8px; color:var(--steel-light);}
  #readouts span{color:var(--readout-teal); font-weight:600;}
  #readouts .g-val{color:var(--hazard-yellow); font-size:10px;}
  #readouts .assumptions{ grid-column:1 / -1; font-size:7px; opacity:0.85; }

  #controls-bottom{ display:flex; align-items:center; justify-content:space-between; gap:6px; margin-top:5px; }
  #pause-btn{ pointer-events:auto; width:38px;height:38px;border-radius:50%;
    background:repeating-conic-gradient(var(--hazard-yellow) 0deg 20deg, var(--steel-dark) 20deg 40deg);
    border:2px solid var(--steel-dark); display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.5); cursor:pointer; flex-shrink:0; }
  #pause-btn .core{ width:26px;height:26px;border-radius:50%; background:var(--hazard-red);
    display:flex;align-items:center;justify-content:center; color:#fff; font-family:'Oswald',sans-serif;
    font-weight:700; font-size:6px; text-align:center; line-height:1.05; border:1.5px solid #7a1e10; }
  #pause-btn.is-paused .core{ background:#3a8f4c; border-color:#1f5c2c; }
  #reset-btn{ pointer-events:auto; font-family:'Oswald',sans-serif; font-weight:700; font-size:8.5px; letter-spacing:0.5px;
    text-transform:uppercase; color:#e9e9e9; background:var(--steel-mid); border:1px solid var(--steel-light);
    padding:6px 9px; border-radius:4px; cursor:pointer; }
  #status-tag{ font-size:7.5px; letter-spacing:0.5px; text-transform:uppercase; padding:3px 6px; border-radius:3px;
    background:var(--steel-mid); color:var(--steel-light); }
  #status-tag.running{ color:#3a8f4c; }
  #status-tag.paused{ color:var(--hazard-red); }

  #legend{ display:flex; flex-wrap:wrap; gap:5px 10px; margin-top:6px; font-size:7px; color:var(--steel-light);
    border-top:1px solid var(--steel-mid); padding-top:5px; }
  #legend span.dot{ display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:3px; }
</style>
</head>
<body>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix;" vr-mode-ui="enabled: false" renderer="antialias:true; alpha:true">
  <a-marker preset="hiro" id="hiro-marker">
    <a-entity id="centrifuge-root" centrifuge-sim position="0 0 0" scale="2.5 2.5 2.5"></a-entity>
  </a-marker>
  <a-entity camera></a-entity>
</a-scene>

<div id="hud">
  <div id="top-bar">
    <div class="brand">AR · CENTRÍFUGA — SÍLICE/AGUA</div>
    <div id="mini-readout">G = <span id="mini-g">—</span></div>
  </div>

  <button id="panel-toggle">▲ Controles</button>

  <div id="panel">
    <h1>Panel — tazón tubular</h1>

    <div class="row">
      <label for="rpm">RPM</label>
      <input type="range" id="rpm" min="500" max="8000" step="50" value="2000">
      <div class="val" id="rpm-val">2000</div>
    </div>
    <div class="row">
      <label for="radio">Radio</label>
      <input type="range" id="radio" min="5" max="30" step="1" value="15">
      <div class="val" id="radio-val">15 cm</div>
    </div>
    <div class="row">
      <label for="drho">Δρ sílice-agua</label>
      <input type="range" id="drho" min="200" max="2000" step="10" value="1650">
      <div class="val" id="drho-val">1650</div>
    </div>

    <div id="readouts">
      <div>ω: <span id="omega-val">—</span> rad/s</div>
      <div>G: <span class="g-val" id="g-val">—</span></div>
      <div>t migración: <span id="time-val">—</span></div>
      <div class="assumptions">Dp=20µm · μ=1.002×10⁻³ Pa·s</div>
    </div>

    <div id="controls-bottom">
      <div id="pause-btn"><div class="core">PAUSA</div></div>
      <button id="reset-btn">↺</button>
      <div id="status-tag" class="running">OPERANDO</div>
    </div>

    <div id="legend">
      <div><span class="dot" style="background:#f2c14e"></span>Sílice</div>
      <div><span class="dot" style="background:#5ec8c2"></span>Agua</div>
      <div><span class="dot" style="background:#e4572e"></span>Torta</div>
    </div>
  </div>
</div>

<script>
// =====================================================================
// FÍSICA — sílice en agua, centrífuga de tazón tubular
// (Geankoplis Cap. 14.4: Ec. 14.4-4, 14.4-7, 14.4-8/9/10 — coincide con el manual)
// =====================================================================
const SIM = {
  rpm: 2000,
  rDrumM: 0.15,
  deltaRho: 1650,
  paused: false,
  dp: 20e-6,
  mu: 1.002e-3,
  g: 9.81,
  r0RealM: 0.001
};

// Constantes de animación, documentadas y acotadas (no un multiplicador plano):
// el tiempo mostrado en el panel usa siempre la física real sin acelerar.
const VISUAL_SPEEDUP = 1.8;
const K_VISUAL_MIN = 0.15, K_VISUAL_MAX = 4.0;
const OMEGA_VISUAL_MIN = 0.4, OMEGA_VISUAL_MAX = 8.0;

function omegaFromRPM(rpm){ return 2 * Math.PI * rpm / 60; }

function computePhysics(){
  const omega = omegaFromRPM(SIM.rpm);
  const G = (omega * omega * SIM.rDrumM) / SIM.g;
  const kReal = (SIM.dp * SIM.dp * SIM.deltaRho * omega * omega) / (18 * SIM.mu);
  const tRealSeconds = kReal > 0 ? Math.log(SIM.rDrumM / SIM.r0RealM) / kReal : Infinity;
  const kVisual = Math.max(K_VISUAL_MIN, Math.min(K_VISUAL_MAX, kReal * VISUAL_SPEEDUP));
  const omegaVisual = Math.max(OMEGA_VISUAL_MIN, Math.min(OMEGA_VISUAL_MAX, omega / 60));
  return { omega, G, kReal, tRealSeconds, kVisual, omegaVisual };
}

function fmtTime(s){
  if (!isFinite(s)) return "—";
  if (s < 60) return s.toFixed(1) + " s";
  if (s < 3600) return (s/60).toFixed(1) + " min";
  return (s/3600).toFixed(2) + " h";
}

function updateReadouts(){
  const p = computePhysics();
  document.getElementById('omega-val').textContent = p.omega.toFixed(1);
  document.getElementById('g-val').textContent = p.G.toFixed(0) + "×g";
  document.getElementById('mini-g').textContent = p.G.toFixed(0) + "×g";
  document.getElementById('time-val').textContent = fmtTime(p.tRealSeconds);
}

document.getElementById('rpm').addEventListener('input', e => {
  SIM.rpm = parseFloat(e.target.value);
  document.getElementById('rpm-val').textContent = SIM.rpm;
  updateReadouts();
});
document.getElementById('radio').addEventListener('input', e => {
  SIM.rDrumM = parseFloat(e.target.value) / 100;
  document.getElementById('radio-val').textContent = e.target.value + " cm";
  updateReadouts();
});
document.getElementById('drho').addEventListener('input', e => {
  SIM.deltaRho = parseFloat(e.target.value);
  document.getElementById('drho-val').textContent = SIM.deltaRho;
  updateReadouts();
});

const panel = document.getElementById('panel');
const panelToggle = document.getElementById('panel-toggle');
panelToggle.addEventListener('click', () => {
  const isOpen = panel.classList.toggle('open');
  panelToggle.textContent = isOpen ? '▼ Ocultar' : '▲ Controles';
});

const pauseBtn = document.getElementById('pause-btn');
const statusTag = document.getElementById('status-tag');
pauseBtn.addEventListener('click', () => {
  SIM.paused = !SIM.paused;
  pauseBtn.classList.toggle('is-paused', SIM.paused);
  pauseBtn.querySelector('.core').textContent = SIM.paused ? 'REAN.' : 'PAUSA';
  statusTag.textContent = SIM.paused ? 'PAUSADO' : 'OPERANDO';
  statusTag.classList.toggle('running', !SIM.paused);
  statusTag.classList.toggle('paused', SIM.paused);
});

document.getElementById('reset-btn').addEventListener('click', () => {
  const comp = document.getElementById('centrifuge-root').components['centrifuge-sim'];
  if (comp) comp.resetParticles();
});

updateReadouts();

// =====================================================================
// COMPONENTE A-FRAME — modelo esbelto/vertical con carcasa + tubo interior
// =====================================================================
AFRAME.registerComponent('centrifuge-sim', {
  init: function () {
    this.visualR = 0.15;
    this.tubeHalfHeight = 0.30;      // cuerpo alargado (más vertical)
    this.tubeRatio = 0.32;           // tubo interior ANGOSTO respecto al radio visual
    this.casingRatio = 0.46;         // carcasa exterior, ligeramente más ancha
    this.silicaParticles = [];
    this.waterParticles = [];
    this.settledCount = 0;
    this.numSilica = 26;
    this.numWater = 15;

    const body = document.createElement('a-entity');
    const H = this.tubeHalfHeight;

    // ---- Base / pie ----
    const base = document.createElement('a-cylinder');
    base.setAttribute('radius', 0.085);
    base.setAttribute('height', 0.045);
    base.setAttribute('position', `0 ${-H - 0.05} 0`);
    base.setAttribute('material', 'color:#2c2e31; metalness:0.7; roughness:0.35');
    body.appendChild(base);

    const foot = document.createElement('a-cylinder');
    foot.setAttribute('radius', 0.055);
    foot.setAttribute('height', 0.035);
    foot.setAttribute('position', `0 ${-H - 0.02} 0`);
    foot.setAttribute('material', 'color:#3d4045; metalness:0.75; roughness:0.3');
    body.appendChild(foot);

    // ---- Carcasa exterior (semi-opaca, deja ver el tubo interior) ----
    const casingR = this.visualR * this.casingRatio;
    this.casing = document.createElement('a-cylinder');
    this.casing.setAttribute('radius', casingR);
    this.casing.setAttribute('height', H * 2);
    this.casing.setAttribute('open-ended', 'true');
    this.casing.setAttribute('segments-radial', 20);
    this.casing.setAttribute('material', 'color:#aab4b8; opacity:0.30; shader:standard; metalness:0.5; roughness:0.4; side:double; transparent:true');
    body.appendChild(this.casing);

    // Costillas verticales decorativas sobre la carcasa
    for (let i = 0; i < 6; i++) {
      const ang = (i / 6) * Math.PI * 2;
      const rib = document.createElement('a-box');
      rib.setAttribute('width', 0.004);
      rib.setAttribute('height', H * 2 * 0.94);
      rib.setAttribute('depth', 0.004);
      rib.setAttribute('position', `${casingR * Math.cos(ang)} 0 ${casingR * Math.sin(ang)}`);
      rib.setAttribute('material', 'color:#7d878b; metalness:0.6; roughness:0.4');
      body.appendChild(rib);
    }

    // ---- Tubo interior visible (ventana), donde ocurre la física ----
    const tubeR = this.visualR * this.tubeRatio;
    this.tube = document.createElement('a-cylinder');
    this.tube.setAttribute('radius', tubeR);
    this.tube.setAttribute('height', H * 1.9);
    this.tube.setAttribute('open-ended', 'true');
    this.tube.setAttribute('segments-radial', 24);
    this.tube.setAttribute('material', 'color:#5ec8c2; opacity:0.16; shader:flat; side:double; transparent:true');
    body.appendChild(this.tube);

    ['top','bottom'].forEach(pos=>{
      const ring = document.createElement('a-torus');
      ring.setAttribute('radius', tubeR);
      ring.setAttribute('radius-tubular', 0.003);
      ring.setAttribute('rotation', '90 0 0');
      ring.setAttribute('position', `0 ${pos==='top'? H*0.95 : -H*0.95} 0`);
      ring.setAttribute('material', 'color:#dff0f0; metalness:0.7; roughness:0.2; emissive:#5ec8c2; emissiveIntensity:0.15');
      body.appendChild(ring);
    });

    // ---- Tapa/domo superior + accesorio de alimentación decorativo ----
    this.dome = document.createElement('a-sphere');
    this.dome.setAttribute('radius', casingR);
    this.dome.setAttribute('theta-length', 95);
    this.dome.setAttribute('position', `0 ${H + 0.01} 0`);
    this.dome.setAttribute('material', 'color:#c7cdd1; metalness:0.75; roughness:0.25');
    body.appendChild(this.dome);

    const inletCup = document.createElement('a-cylinder');
    inletCup.setAttribute('radius', 0.018);
    inletCup.setAttribute('height', 0.03);
    inletCup.setAttribute('position', `0 ${H + casingR * 0.6 + 0.02} 0`);
    inletCup.setAttribute('material', 'color:#dfe3e6; metalness:0.6; roughness:0.3; opacity:0.85; transparent:true');
    body.appendChild(inletCup);

    // ---- Panel de control lateral con luces ----
    const panelBox = document.createElement('a-box');
    panelBox.setAttribute('width', 0.05);
    panelBox.setAttribute('height', 0.045);
    panelBox.setAttribute('depth', 0.014);
    panelBox.setAttribute('position', `${-casingR - 0.03} ${H*0.5} ${casingR*0.4}`);
    panelBox.setAttribute('rotation', '0 25 0');
    panelBox.setAttribute('material', 'color:#1c1e21; metalness:0.5; roughness:0.5');
    body.appendChild(panelBox);
    [['-0.009','#3a8f4c'], ['0.009','#e4572e']].forEach(([dx,color])=>{
      const light = document.createElement('a-sphere');
      light.setAttribute('radius', 0.0035);
      light.setAttribute('position', `${-casingR - 0.03 + parseFloat(dx)} ${H*0.5} ${casingR*0.4 + 0.012}`);
      light.setAttribute('material', `color:${color}; shader:flat; emissive:${color}; emissiveIntensity:0.7`);
      body.appendChild(light);
    });
    const leverArm = document.createElement('a-cylinder');
    leverArm.setAttribute('radius', 0.0025);
    leverArm.setAttribute('height', 0.02);
    leverArm.setAttribute('position', `${-casingR - 0.03} ${H*0.5 + 0.028} ${casingR*0.4}`);
    leverArm.setAttribute('rotation', '0 25 30');
    leverArm.setAttribute('material', 'color:#d1481f; metalness:0.6; roughness:0.3');
    body.appendChild(leverArm);

    // ---- Tubería de alimentación (abajo) ----
    const feedPipe = document.createElement('a-cylinder');
    feedPipe.setAttribute('radius', 0.007);
    feedPipe.setAttribute('height', 0.14);
    feedPipe.setAttribute('rotation', '0 0 62');
    feedPipe.setAttribute('position', `${-casingR - 0.04} ${-H - 0.02} 0`);
    feedPipe.setAttribute('material', 'color:#9aa0a6; metalness:0.8; roughness:0.3');
    body.appendChild(feedPipe);
    const feedLabel = document.createElement('a-text');
    feedLabel.setAttribute('value', '▲ ENTRADA\n(suspensión)');
    feedLabel.setAttribute('align', 'center');
    feedLabel.setAttribute('color', '#f2c14e');
    feedLabel.setAttribute('scale', '0.20 0.20 0.20');
    feedLabel.setAttribute('position', `${-casingR - 0.14} ${-H - 0.09} 0`);
    body.appendChild(feedLabel);

    // ---- Salidas de fase (arriba, anguladas) ----
    const lightPipe = document.createElement('a-cylinder');
    lightPipe.setAttribute('radius', 0.006);
    lightPipe.setAttribute('height', 0.14);
    lightPipe.setAttribute('rotation', '0 0 -52');
    lightPipe.setAttribute('position', `${-casingR - 0.03} ${H + 0.06} 0`);
    lightPipe.setAttribute('material', 'color:#5ec8c2; metalness:0.6; roughness:0.4');
    body.appendChild(lightPipe);
    const lightLabel = document.createElement('a-text');
    lightLabel.setAttribute('value', 'FASE LIGERA\n(agua)');
    lightLabel.setAttribute('align', 'center');
    lightLabel.setAttribute('color', '#5ec8c2');
    lightLabel.setAttribute('scale', '0.20 0.20 0.20');
    lightLabel.setAttribute('position', `${-casingR - 0.15} ${H + 0.13} 0`);
    body.appendChild(lightLabel);

    const heavyPipe = document.createElement('a-cylinder');
    heavyPipe.setAttribute('radius', 0.006);
    heavyPipe.setAttribute('height', 0.14);
    heavyPipe.setAttribute('rotation', '0 0 52');
    heavyPipe.setAttribute('position', `${casingR + 0.03} ${H + 0.06} 0`);
    heavyPipe.setAttribute('material', 'color:#2f7d5c; metalness:0.6; roughness:0.4');
    body.appendChild(heavyPipe);
    const heavyLabel = document.createElement('a-text');
    heavyLabel.setAttribute('value', 'FASE PESADA\n(sílice)');
    heavyLabel.setAttribute('align', 'center');
    heavyLabel.setAttribute('color', '#2f7d5c');
    heavyLabel.setAttribute('scale', '0.20 0.20 0.20');
    heavyLabel.setAttribute('position', `${casingR + 0.15} ${H + 0.13} 0`);
    body.appendChild(heavyLabel);

    // ---- Eje central ----
    this.axis = document.createElement('a-cylinder');
    this.axis.setAttribute('radius', 0.0035);
    this.axis.setAttribute('height', H * 2 + 0.03);
    this.axis.setAttribute('material', 'color:#f2c14e; shader:flat');
    body.appendChild(this.axis);

    // ---- Torta de sedimento junto a la pared del tubo interior ----
    this.cake = document.createElement('a-torus');
    this.cake.setAttribute('radius', tubeR * 0.95);
    this.cake.setAttribute('radius-tubular', 0.008);
    this.cake.setAttribute('rotation', '90 0 0');
    this.cake.setAttribute('material', 'color:#e4572e; opacity:0.12; shader:flat; transparent:true');
    body.appendChild(this.cake);

    this.el.appendChild(body);

    // ---- Grupo giratorio de partículas ----
    this.spinGroup = document.createElement('a-entity');
    this.el.appendChild(this.spinGroup);

    for (let i = 0; i < this.numSilica; i++) {
      const sphere = document.createElement('a-sphere');
      sphere.setAttribute('radius', 0.0075);
      sphere.setAttribute('material', 'color:#f2c14e; shader:flat; emissive:#f2c14e; emissiveIntensity:0.4');
      this.spinGroup.appendChild(sphere);
      this.silicaParticles.push(this.makeSilicaParticle(sphere, true));
    }
    for (let i = 0; i < this.numWater; i++) {
      const sphere = document.createElement('a-sphere');
      sphere.setAttribute('radius', 0.005);
      sphere.setAttribute('material', 'color:#5ec8c2; shader:flat; opacity:0.75; transparent:true');
      this.spinGroup.appendChild(sphere);
      this.waterParticles.push({
        el: sphere,
        r: tubeR * (0.15 + Math.random() * 0.55),
        theta: Math.random() * Math.PI * 2,
        h: (Math.random() - 0.5) * H * 1.7
      });
    }

    this._tubeR = tubeR;
  },

  makeSilicaParticle: function (el, randomizePhase) {
    const tubeR = this._tubeR || this.visualR * this.tubeRatio;
    return {
      el,
      r0: tubeR * (0.04 + Math.random() * 0.10),
      theta: Math.random() * Math.PI * 2,
      h: (Math.random() - 0.5) * this.tubeHalfHeight * 1.7,
      elapsed: randomizePhase ? Math.random() * 1.6 : 0,
      settled: false,
      settleTimer: 0
    };
  },

  resetParticles: function () {
    this.settledCount = 0;
    this.cake.setAttribute('material', 'opacity', 0.12);
    this.silicaParticles.forEach(p => {
      Object.assign(p, this.makeSilicaParticle(p.el, false));
      p.el.setAttribute('material', 'color', '#f2c14e');
    });
  },

  tick: function (time, delta) {
    const dt = Math.min(delta / 1000, 0.05);
    const p = computePhysics();

    // El radio FÍSICO (slider) solo escala el tubo interior visible;
    // la carcasa exterior mantiene proporción fija para que el equipo
    // no se deforme al mover el slider.
    const targetVisualR = 0.14 + (SIM.rDrumM - 0.05) / (0.30 - 0.05) * 0.22;
    if (Math.abs(targetVisualR - this.visualR) > 0.001) {
      this.visualR = targetVisualR;
      const newTubeR = this.visualR * this.tubeRatio;
      this.tube.setAttribute('radius', newTubeR);
      this.cake.setAttribute('radius', newTubeR * 0.95);
      this._tubeR = newTubeR;
    }
    const tR = this._tubeR;

    if (SIM.paused) return;

    this.spinGroup.object3D.rotation.y += p.omegaVisual * dt;

    this.silicaParticles.forEach(part => {
      if (part.settled) {
        part.settleTimer += dt;
        if (part.settleTimer > 1.8) {
          this.settledCount = Math.max(0, this.settledCount - 1);
          Object.assign(part, this.makeSilicaParticle(part.el, false));
          part.el.setAttribute('material', 'color', '#f2c14e');
        }
      } else {
        part.elapsed += dt;
        let r = part.r0 * Math.exp(p.kVisual * part.elapsed);
        if (r >= tR) {
          r = tR;
          part.settled = true;
          part.settleTimer = 0;
          this.settledCount++;
          part.el.setAttribute('material', 'color', '#e4572e');
          const cakeOpacity = Math.min(0.7, 0.12 + this.settledCount * 0.05);
          this.cake.setAttribute('material', 'opacity', cakeOpacity);
        }
        const x = r * Math.cos(part.theta);
        const z = r * Math.sin(part.theta);
        part.el.object3D.position.set(x, part.h, z);
      }
    });

    // Movimiento del agua: supuesto visual (no ecuación de Geankoplis),
    // documentado como tal en el manual.
    this.waterParticles.forEach(w => {
      w.theta += p.omegaVisual * dt * 0.55;
      const x = w.r * Math.cos(w.theta);
      const z = w.r * Math.sin(w.theta);
      w.el.object3D.position.set(x, w.h, z);
    });

    if (!this._lastUI || time - this._lastUI > 200) {
      this._lastUI = time;
      updateReadouts();
    }
  }
});
</script>
