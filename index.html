<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Simulador AR - Separación Sílice/Agua</title>
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .controls {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1000;
            width: 90%;
            max-width: 600px;
            max-height: 40vh;
            overflow-y: auto;
        }
        
        .control-group { margin-bottom: 10px; }
        .control-group label {
            display: block;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 3px;
            font-size: 0.85em;
        }
        
        .slider {
            width: 100%;
            height: 6px;
            border-radius: 5px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
        }
        
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #e67e22;
            cursor: pointer;
        }
        
        .value-display {
            display: flex;
            justify-content: space-between;
            margin-top: 3px;
            font-size: 0.8em;
        }
        
        .value { font-weight: bold; color: #e67e22; }
        
        .results {
            background: #f4f6f7;
            padding: 8px;
            border-radius: 5px;
            margin-top: 10px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            border-left: 4px solid #3498db;
        }
        
        .result-item { text-align: center; font-size: 0.8em; }
        .result-item strong { display: block; color: #2c3e50; }
        
        .buttons { display: flex; gap: 10px; margin-top: 10px; }
        
        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9em;
        }
        
        .btn-pause { background: #e74c3c; color: white; }
        .btn-pause:hover { background: #c0392b; }
        .btn-reset { background: #3498db; color: white; }
        .btn-reset:hover { background: #2980b9; }
        
        .info {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            text-align: center;
            z-index: 1000;
            font-size: 0.9em;
        }
        
        .legend {
            margin-top: 5px;
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 0.8em;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div class="info">
         Separación Sólido-Líquido en Tiempo Real (Marcador Hiro)
    </div>

    <div class="controls">
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
            <div class="control-group">
                <label>Velocidad (RPM)</label>
                <input type="range" min="100" max="20000" value="4000" class="slider" id="rpmSlider">
                <div class="value-display">
                    <span class="value" id="rpmValue">4000</span>
                    <span>RPM</span>
                </div>
            </div>
            
            <div class="control-group">
                <label>Radio Tazón (m)</label>
                <input type="range" min="0.01" max="0.5" step="0.01" value="0.08" class="slider" id="radiusSlider">
                <div class="value-display">
                    <span class="value" id="radiusValue">0.08</span>
                    <span>m</span>
                </div>
            </div>
            
            <div class="control-group">
                <label>Δρ (Diferencia ρ)</label>
                <input type="range" min="500" max="3000" step="10" value="1652" class="slider" id="deltaRhoSlider">
                <div class="value-display">
                    <span class="value" id="deltaRhoValue">1652</span>
                    <span>kg/m³</span>
                </div>
            </div>
        </div>
        
        <div class="results">
            <div class="result-item">
                <strong>ω (Vel. Angular)</strong>
                <span id="omegaResult">0.00 rad/s</span>
            </div>
            <div class="result-item">
                <strong>Factor G (FCR)</strong>
                <span id="gResult">0.0</span>
            </div>
            <div class="result-item">
                <strong>vt (Sedimentación Sílice)</strong>
                <span id="vtResult">0.00 m/s</span>
            </div>
        </div>
        
        <div class="legend">
            <div class="legend-item"><span style="width:10px;height:10px;background:#dfae7b;border-radius:50%;display:inline-block;"></span> Sílice (Sólido)</div>
            <div class="legend-item"><span style="width:10px;height:10px;background:#3498db;border-radius:50%;display:inline-block;"></span> Agua (Líquido)</div>
            <div class="legend-item"><span style="width:10px;height:10px;background:#9b59b6;border-radius:50%;display:inline-block;"></span> Torta Compactada</div>
        </div>
        
        <div class="buttons">
            <button class="btn-pause" id="pauseBtn">⏸️ PAUSA</button>
            <button class="btn-reset" id="resetBtn">🔄 REINICIAR MEZCLA</button>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
        
        <a-marker preset="hiro" id="hiroMarker">
            <a-entity id="centrifuge" position="0 0.3 0" scale="3.5 3.5 3.5">
                
                <a-cylinder position="0 -0.15 0" radius="0.11" height="0.06" color="#2c3e50" metalness="0.7"></a-cylinder>
                <a-cylinder position="0 -0.08 0" radius="0.07" height="0.06" color="#7f8c8d" metalness="0.5"></a-cylinder>
                <a-cylinder position="-0.05 -0.12 0" radius="0.01" height="0.08" color="#875a36" rotation="0 0 90"></a-cylinder> <a-cylinder position="0.05 0.35 0" radius="0.01" height="0.08" color="#3498db" rotation="0 0 90"></a-cylinder> <a-entity id="rotatingRotor">
                    
                    <a-cylinder id="bowl" position="0 0.15 0" radius="0.08" height="0.35" 
                                color="#ffffff" opacity="0.15" material="transparent: true; roughness: 0.1; metalness: 0.2">
                    </a-cylinder>
                    
                    <a-cylinder id="bowlWall" position="0 0.15 0" radius="0.081" height="0.35" 
                                material="color: #9b59b6; opacity: 0.0; side: back; transparent: true">
                    </a-cylinder>
                    
                    <a-box position="0 0.15 0.08" width="0.002" height="0.35" depth="0.002" color="#ffffff" opacity="0.3"></a-box>
                    <a-box position="0 0.15 -0.08" width="0.002" height="0.35" depth="0.002" color="#ffffff" opacity="0.3"></a-box>

                    <a-entity id="particlesContainer"></a-entity>

                </a-entity>
                
                <a-text position="0 0.45 0" value="Separador Tubular\nFase Sólido - Líquido" 
                        align="center" color="#2c3e50" scale="0.32 0.32 0.32"></a-text>
            </a-entity>
        </a-marker>
        
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // ============================================
        // CONFIGURACIÓN CIENTÍFICA (Geankoplis 14.4)
        // ============================================
        const MU_FLUIDO = 1.002e-3; 
        const DP_SILICE = 25e-6;    
        const G_ACCEL = 9.81;
        
        let rpm = 4000;
        let radius = 0.08; 
        let deltaRho = 1652; 
        let isPaused = false;
        
        let particles = [];
        let omega = (2 * Math.PI * rpm) / 60;
        let currentRotationY = 0;
        
        // Parámetros de simulación visual
        const VISUAL_SPEED_MULTIPLIER = 140; 
        const VISUAL_SPIN_SCALE = 0.15;
        const BOWL_HEIGHT = 0.35;
        const BOWL_Y_POSITION = 0.15;

        const VISUAL_RADIUS_MIN = 0.04; 
        const VISUAL_RADIUS_MAX = 0.09; 
        const PHYSICAL_RADIUS_MIN = 0.01; 
        const PHYSICAL_RADIUS_MAX = 0.5;

        function mapPhysicalToVisualRadius(physicalRadius) {
            const normalizedRadius = (physicalRadius - PHYSICAL_RADIUS_MIN) / (PHYSICAL_RADIUS_MAX - PHYSICAL_RADIUS_MIN);
            return VISUAL_RADIUS_MIN + normalizedRadius * (VISUAL_RADIUS_MAX - VISUAL_RADIUS_MIN);
        }

        // ============================================
        // CLASE DE PARTÍCULAS MIXTAS (SÍLICE O AGUA)
        // ============================================
        class FluidParticle {
            constructor(type) {
                this.type = type; // 'silica' o 'water'
                this.domElement = null;
                this.reset();
            }
            
            reset() {
                this.angleOffset = Math.random() * 2 * Math.PI;
                this.height = Math.random() * 0.04; // Empiezan abajo (entrada)
                this.deposited = false;
                
                if (this.type === 'silica') {
                    this.r = Math.random() * 0.015 + 0.002; // Sílice entra más disperso al centro
                } else {
                    this.r = Math.random() * 0.025 + 0.001; // El agua llena el volumen central basal
                }
                
                if (this.domElement) {
                    this.domElement.setAttribute('color', this.type === 'silica' ? '#dfae7b' : '#3498db');
                    this.domElement.setAttribute('opacity', this.type === 'silica' ? '1.0' : '0.4');
                }
            }
            
            update(dt) {
                if (this.deposited) return;
                
                const visualRadius = mapPhysicalToVisualRadius(radius);
                
                if (this.type === 'silica') {
                    // Ecuación exacta del Geankoplis aplicada solo al sólido (Sílice)
                    const vt = (Math.pow(omega, 2) * this.r * Math.pow(DP_SILICE, 2) * deltaRho) / (18 * MU_FLUIDO);
                    this.r += vt * dt * VISUAL_SPEED_MULTIPLIER;
                    
                    // Verificación de choque contra la pared exterior (Captura de Torta sólid)
                    if (this.r >= visualRadius - 0.003) {
                        this.r = visualRadius - 0.003;
                        this.deposited = true;
                        this.domElement.setAttribute('color', '#9b59b6'); // Color torta compacta (púrpura industrial)
                    }
                } else {
                    // El agua (Líquido) NO sedimenta radialmente, se estabiliza hidrodinámicamente en una capa intermedia
                    const capaEquilibrio = visualRadius * 0.6;
                    if (this.r < capaEquilibrio) {
                        this.r += dt * 0.02; // Fluye hacia su zona de paso libre
                    }
                }
                
                // Ambas fases se desplazan de manera ascendente continua
                this.height += dt * 0.09; 
                
                // Si la partícula llega arriba, sale del sistema y recircula por la alimentación
                if (this.height >= BOWL_HEIGHT) {
                    this.reset();
                }
            }
        }

        // ============================================
        // CONTROLADORES DE RENDERIZADO
        // ============================================
        function initSystem() {
            const container = document.getElementById('particlesContainer');
            container.innerHTML = '';
            particles = [];
            
            // Generamos una mezcla controlada: 40 granos de Sílice y 40 moléculas de Agua
            for (let i = 0; i < 42; i++) particles.push(new FluidParticle('silica'));
            for (let i = 0; i < 38; i++) particles.push(new FluidParticle('water'));
            
            particles.forEach((p, index) => {
                const el = document.createElement('a-sphere');
                el.setAttribute('radius', p.type === 'silica' ? '0.0045' : '0.0035'); // El sólido es ligeramente más grande
                el.setAttribute('color', p.type === 'silica' ? '#dfae7b' : '#3498db');
                el.setAttribute('opacity', p.type === 'silica' ? '1.0' : '0.4');
                el.setAttribute('roughness', p.type === 'silica' ? '0.9' : '0.1');
                
                container.appendChild(el);
                p.domElement = el;
            });
        }
        
        function updateVisuals(dt) {
            let totalSilica = 0;
            let silicaDeposited = 0;
            
            particles.forEach(p => {
                p.update(dt);
                
                const x = p.r * Math.cos(p.angleOffset);
                const z = p.r * Math.sin(p.angleOffset);
                const y = BOWL_Y_POSITION - BOWL_HEIGHT/2 + p.height;
                
                p.domElement.setAttribute('position', `${x} ${y} ${z}`);
                
                if (p.type === 'silica') {
                    totalSilica++;
                    if (p.deposited) silicaDeposited++;
                }
            });
            
            // Opacidad de la torta retenedora basada en la eficiencia real de la mezcla
            const wall = document.getElementById('bowlWall');
            if (wall && totalSilica > 0) {
                const ratio = silicaDeposited / totalSilica;
                wall.setAttribute('material', `color: #9b59b6; opacity: ${ratio * 0.6}; side: back; transparent: true`);
            }
        }
        
        function updatePhysicsValues() {
            omega = (2 * Math.PI * rpm) / 60;
            const G = (Math.pow(omega, 2) * radius) / G_ACCEL;
            const vt = (Math.pow(omega, 2) * radius * Math.pow(DP_SILICE, 2) * deltaRho) / (18 * MU_FLUIDO);
            
            document.getElementById('rpmValue').textContent = rpm;
            document.getElementById('radiusValue').textContent = radius.toFixed(2);
            document.getElementById('deltaRhoValue').textContent = deltaRho;
            document.getElementById('omegaResult').textContent = omega.toFixed(2) + ' rad/s';
            document.getElementById('gResult').textContent = G.toFixed(1);
            document.getElementById('vtResult').textContent = vt.toExponential(3) + ' m/s';
            
            const visualRadius = mapPhysicalToVisualRadius(radius);
            document.getElementById('bowl').setAttribute('radius', visualRadius);
            document.getElementById('bowlWall').setAttribute('radius', visualRadius + 0.001);
        }
        
        // Loop de Renderizado de A-Frame
        let lastTime = 0;
        function animate(currentTime) {
            requestAnimationFrame(animate);
            if (!lastTime) lastTime = currentTime;
            const dt = (currentTime - lastTime) / 1000;
            lastTime = currentTime;
            
            if (!isPaused) {
                updateVisuals(dt);
                
                // Rotación física del cilindro contenedor
                const rotatingRotor = document.getElementById('rotatingRotor');
                if (rotatingRotor) {
                    currentRotationY += (omega * dt * VISUAL_SPIN_SCALE);
                    rotatingRotor.setAttribute('rotation', `0 ${currentRotationY} 0`);
                }
                
                // Desprendimiento continuo regulado para mantener el estado estacionario dinámico
                if (Math.random() < 0.05) {
                    const dep = particles.find(p => p.type === 'silica' && p.deposited);
                    if (dep) dep.reset();
                }
            }
        }
        
        // Enlaces de la interfaz con las funciones físicas
        document.getElementById('rpmSlider').addEventListener('input', (e) => { rpm = parseInt(e.target.value); updatePhysicsValues(); });
        document.getElementById('radiusSlider').addEventListener('input', (e) => { radius = parseFloat(e.target.value); updatePhysicsValues(); });
        document.getElementById('deltaRhoSlider').addEventListener('input', (e) => { deltaRho = parseInt(e.target.value); updatePhysicsValues(); });
        
        document.getElementById('pauseBtn').addEventListener('click', () => {
            isPaused = !isPaused;
            const btn = document.getElementById('pauseBtn');
            btn.textContent = isPaused ? '▶️ CONTINUAR' : '⏸️ PAUSA';
            btn.style.background = isPaused ? '#27ae60' : '#e74c3c';
        });
        
        document.getElementById('resetBtn').addEventListener('click', () => { initSystem(); lastTime = 0; });
        
        // Inicialización del simulador
        initSystem();
        updatePhysicsValues();
        animate(0);
    </script>
</body>
</html>
